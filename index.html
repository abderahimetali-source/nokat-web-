<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nokat Pro - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        * { font-family: 'Cairo', sans-serif; }
        body { background: #0f172a; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(148, 163, 184, 0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div id="app">
        <div v-if="!isLoggedIn" class="glass rounded-2xl p-8 w-full max-w-md">
            <h1 class="text-3xl font-bold text-white text-center mb-8">لوحة تحكم النكت</h1>
            <input v-model="password" @keyup.enter="login" type="password" placeholder="كلمة السر" 
                   class="w-full px-4 py-3 bg-slate-800 text-white rounded-lg mb-4 text-center">
            <button @click="login" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-bold">
                دخول
            </button>
            <p v-if="error" class="text-red-400 text-center mt-4">{{ error }}</p>
        </div>
        
        <div v-else class="glass rounded-2xl p-8 w-full max-w-2xl">
            <div class="flex justify-between items-center mb-6">
                <h1 class="text-2xl font-bold text-white">إدارة النكت</h1>
                <button @click="logout" class="bg-red-600 px-4 py-2 rounded-lg text-white">خروج</button>
            </div>
            <p class="text-green-400 text-center text-xl">✅ تم تسجيل الدخول بنجاح!</p>
            <p class="text-gray-300 text-center mt-4">كلمة السر شغالة. كمل باقي الكود من عندك</p>
        </div>
    </div>

    <script>
        const { createApp } = Vue;
        
        createApp({
            data() {
                return {
                    password: '',
                    isLoggedIn: false,
                    error: ''
                }
            },
            methods: {
                login() {
                    console.log('زر الدخول انضغط');
                    if (this.password === 'mewa99') {
                        this.isLoggedIn = true;
                        this.error = '';
                        alert('تم الدخول بنجاح');
                    } else {
                        this.error = 'كلمة السر غلط';
                    }
                },
                logout() {
                    this.isLoggedIn = false;
                    this.password = '';
                }
            }
        }).mount('#app');
    </script>
</body>
</html>
