<!DOCTYPE html>

<style>
@import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
* { font-family: 'Cairo', sans-serif; }
body { background: #0f172a; }
.glass {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(148, 163, 184, 0.1);
}
.gradient-text {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
}
.gradient-border {
    position: relative;
}
.gradient-border::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 2px;
    background: linear-gradient(135deg, #fbbf24, #d97706);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
}
.joke-card {
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}
.joke-card:hover {
    transform: translateY(-4px);
}
.btn-glow:hover {
    box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
}
.scrollbar-hide::-webkit-scrollbar {
    display: none;
}
.scrollbar-hide {
    -ms-overflow-style: none;
    scrollbar-width: none;
}
@keyframes slideIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.slide-in {
    animation: slideIn 0.4s ease-out;
}
@keyframes pulse-ring {
    0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); }
    70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); }
    100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); }
}
.pulse-ring {
    animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
}
</style>
</head>

function showToast(message, type = 'success') {
    const toast = document.getElementById('toast');
    const toastMessage = document.getElementById('toastMessage');
    const icon = toast.querySelector('i');
    
    toastMessage.textContent = message;
    icon.setAttribute('data-lucide', type === 'success' ? 'check-circle' : 'alert-circle');
    icon.className = `w-5 h-5 ${type === 'success' ? 'text-green-400' : 'text-red-400'}`;
    lucide.createIcons();
    
    toast.classList.remove('hidden');
    setTimeout(() => toast.classList.add('hidden'), 3000);
}

                            </div>
                        </div>
                    </div>
                    <div class="glass rounded-xl p-4">

                                <i data-lucide="message-circle" class="w-5 h-5 text-blue-500"></i>
                            </div>
                            <div>
                                <p class="text-2xl font-bold">${jokes.reduce((sum, j) => sum + (j.comments?.length || 0), 0)}</p>
                                <p class="text-xs text-slate-400">تعليق</p>
                            </div>
                        </div>
                    <div class="glass rounded-xl p-4">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-lg bg-purple-500/20 flex items-center justify-center">
                                <i data-lucide="users" class="w-5 h-5 text-purple-500"></i>
                            </div>

                <!-- Jokes Grid -->

                                    <i data-lucide="heart" class="w-4 h-4 ${joke.likes?.includes(currentUser?.uid) ? 'fill-current' : ''}"></i>
                                    <span class="text-sm font-medium">${joke.likes?.length || 0}</span>
                                </button>
                                <button data-action="comment" data-id="${joke.id}" class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-slate-800 transition-all text-slate-400">

function attachEventListeners() {
    document.getElementById('logoutBtn')?.addEventListener('click', () => {
        signOut(auth);
        isAdmin = false;
        showToast('تم تسجيل الخروج بنجاح');
    });

    document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        authModal.classList.remove('hidden');
        authModal.classList.add('flex');
    });

    document.getElementById('adminBtn')?.addEventListener('click', () => {
        if (isAdmin) {
            isAdmin = false;
            showToast('تم تسجيل خروج الأدمن');
            renderApp();
        } else {
            adminLoginModal.classList.remove('hidden');
            adminLoginModal.classList.add('flex');
        }
    });

    document.getElementById('postJokeBtn')?.addEventListener('click', postJoke);
    
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
            selectedCategory = e.currentTarget.dataset.category;
            renderApp();
        });
    });

    document.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', handleAction);
    });

    document.querySelectorAll('.comment-input').forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const jokeId = e.target.dataset.joke;
                const btn = document.querySelector(`[data-action="add-comment"][data-id="${jokeId}"]`);
                btn?.click();
            }
        });
    });
}

async function handleAction(e) {
    const btn = e.currentTarget;
    const action = btn.dataset.action;
    const jokeId = btn.dataset.id || btn.dataset.joke;

    if (!currentUser && action !== 'delete' && action !== 'ban') {
        showToast('يجب تسجيل الدخول أولاً', 'error');
        return;
    }

    const jokeRef = doc(db, 'jokes', jokeId);
    
    try {
        switch(action) {
            case 'like':
                const joke = jokes.find(j => j.id === jokeId);
                const hasLiked = joke.likes?.includes(currentUser.uid);
                await updateDoc(jokeRef, {
                    likes: hasLiked ? arrayRemove(currentUser.uid) : arrayUnion(currentUser.uid)
                });
                break;
                
            case 'comment':
                const commentsDiv = document.getElementById(`comments-${jokeId}`);
                commentsDiv.classList.toggle('hidden');
                break;
                
            case 'add-comment':
                const input = document.querySelector(`.comment-input[data-joke="${jokeId}"]`);
                const text = input.value.trim();
                if (!text) return;
                
                if (bannedUsers.has(currentUser.uid)) {
                    showToast('تم حظرك من التعليق', 'error');
                    return;
                }
                
                const comment = {
                    text,
                    authorId: currentUser.uid,
                    authorName: currentUser.displayName,
                    authorPhoto: currentUser.photoURL,
                    timestamp: serverTimestamp()
                };
                await updateDoc(jokeRef, {
                    comments: arrayUnion(comment)
                });
                input.value = '';
                showToast('تم إضافة التعليق');
                break;
                
            case 'delete-comment':
                if (!isAdmin) return;
                const joke2 = jokes.find(j => j.id === jokeId);
                const idx = parseInt(btn.dataset.index);
                const updatedComments = joke2.comments.filter((_, i) => i !== idx);
                await updateDoc(jokeRef, { comments: updatedComments });
                showToast('تم حذف التعليق');
                break;
                
            case 'delete':
                if (!isAdmin) return;
                if (confirm('هل أنت متأكد من حذف هذه النكتة؟')) {
                    await deleteDoc(jokeRef);
                    showToast('تم حذف النكتة');
                }
                break;
                
            case 'ban':
                if (!isAdmin) return;
                const userId = btn.dataset.user;
                if (confirm('هل تريد حظر هذا المستخدم؟')) {
                    await setDoc(doc(db, 'bannedUsers', userId), {
                        bannedAt: serverTimestamp(),
                        bannedBy: currentUser.uid
                    });
                    showToast('تم حظر المستخدم');
                }
                break;
        }
    } catch (error) {
        console.error('Error:', error);
        showToast('حدث خطأ', 'error');
    }
}

async function postJoke() {
    const input = document.getElementById('jokeInput');
    const categorySelect = document.getElementById('categorySelect');
    const text = input.value.trim();
    
    if (!text) {
        showToast('اكتب النكتة أولاً', 'error');
        return;
    }
    
    if (bannedUsers.has(currentUser.uid)) {
        showToast('تم حظرك من النشر', 'error');
        return;
    }
    
    try {
        await addDoc(collection(db, 'jokes'), {
            text,
            category: categorySelect.value,
            authorId: currentUser.uid,
            authorName: currentUser.displayName,
            authorPhoto: currentUser.photoURL,
            likes: [],
            comments: [],
            timestamp: serverTimestamp()
        });
        
        input.value = '';
        showToast('تم نشر النكتة بنجاح!');
    } catch (error) {
        console.error('Error posting joke:', error);
        showToast('حدث خطأ في النشر', 'error');
    }
}

function initRealtimeListeners() {
    const jokesQuery = query(collection(db, 'jokes'), orderBy('timestamp', 'desc'));
    unsubscribeJokes = onSnapshot(jokesQuery, (snapshot) => {
        jokes = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderApp();
    });

    const bansQuery = query(collection(db, 'bannedUsers'));
    unsubscribeBans = onSnapshot(bansQuery, (snapshot) => {
        bannedUsers = new Set(snapshot.docs.map(doc => doc.id));
    });
}

// Auth handlers
document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    try {
        await signInWithPopup(auth, provider);
        authModal.classList.add('hidden');
        showToast('تم تسجيل الدخول بنجاح');
    } catch (error) {
        console.error('Login error:', error);
        showToast('فشل تسجيل الدخول', 'error');
    }
});

document.getElementById('adminLoginBtn').addEventListener('click', () => {
    const password = document.getElementById('adminPassword').value;
    if (password === ADMIN_PASSWORD) {
        isAdmin = true;
        adminLoginModal.classList.add('hidden');
        document.getElementById('adminPassword').value = '';
        showToast('تم تفعيل وضع الأدمن');
        renderApp();
    } else {
        showToast('كلمة المرور خاطئة', 'error');
    }
});

document.getElementById('adminCancelBtn').addEventListener('click', () => {
    adminLoginModal.classList.add('hidden');
    document.getElementById('adminPassword').value = '';
});

authModal.addEventListener('click', (e) => {
    if (e.target === authModal) authModal.classList.add('hidden');
});

adminLoginModal.addEventListener('click', (e) => {
    if (e.target === adminLoginModal) adminLoginModal.classList.add('hidden');
});

// Auth state observer
onAuthStateChanged(auth, (user) => {
    currentUser = user;
    if (!user) {
        isAdmin = false;
        authModal.classList.remove('hidden');
        authModal.classList.add('flex');
    } else {
        authModal.classList.add('hidden');
    }
    renderApp();
});

// Initialize
initRealtimeListeners();
lucide.createIcons();
</script>
